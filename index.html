<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>FunPay OTC</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Мини-апп раздаётся прямо с сервера бота — API относительный, никаких HTTPS/HTTP конфликтов
    window.FUNPAY_API_BASE = '';
  </script>
</head>
<body>

<div id="app" class="app">
  <div id="loader" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px">
    <div style="width:48px;height:48px;border:4px solid rgba(255,255,255,0.1);border-top-color:#2563EB;border-radius:50%;animation:spin 0.8s linear infinite"></div>
    <div style="color:rgba(255,255,255,0.5);font-size:14px">Загрузка...</div>
  </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="app.js"></script>

</body>
</html>
